modLoader = "neoforge"
loaderVersion = "*"
license = "CC BY-NC-SA 4.0"
modId = "${id}"

[[mods]]
modId = "${id}"
version = "${version}"
displayName = "${name}"
authors = "MegaBytesMe"
description = '''
MineLights is a Minecraft mod that brings RGB lighting integrations to Minecraft Java Edition.
'''
logoFile = "assets/${id}/icon.png"
logoBlur = false

displayURL="https://modrinth.com/mod/minelights"
issueTrackerURL="https://github.com/megabytesme/MineLights/issues"

[[dependencies.${id}]]
    modId="neoforge"
    mandatory=true
    # Version range for the NeoForge loader.
    versionRange="*"
    ordering="NONE"
    side="CLIENT"

[[dependencies.${id}]]
    modId="minecraft"
    mandatory=true
    # The Minecraft version range from your build script.
    versionRange="${minecraft}"
    ordering="NONE"
    side="CLIENT"

[[mixins]]
config = "template-common.mixins.json"

[[mixins]]
config = "template-neoforge.mixins.json"